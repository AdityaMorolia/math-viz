<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linear Algebra Dojo</title>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <header class="sidebar-header">
          <h1>Linear Algebra Dojo</h1>
          <p>Drag vectors, stretch the plane, and watch the numbers move.</p>
          <label class="mode-picker">
            Mode
            <select id="mode-select" aria-label="dojo mode">
              <option value="algebra">Algebra</option>
              <option value="geometry">Geometry</option>
              <option value="eigenvectors">Eigenvectors</option>
            </select>
          </label>
        </header>

        <div id="mode-panel" class="mode-panel"></div>

        <section class="panel-section">
          <div class="section-title">View</div>
          <label class="range-label">
            Zoom out
            <input id="zoomOut" type="range" min="-1" max="5" step="0.05" />
          </label>
          <button id="reset-view" type="button">Reset view</button>
        </section>
      </aside>

      <main class="canvas-wrap">
        <canvas id="dojo-canvas" aria-label="Linear algebra visualization"></canvas>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
