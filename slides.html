<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linear Algebra and Complex Numbers Slides</title>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["\\(", "\\)"]],
          displayMath: [["\\[", "\\]"]],
          packages: { "[+]": ["ams"] },
          macros: {
            ket: ["\\left|#1\\right\\rangle", 1],
            bra: ["\\left\\langle #1\\right|", 1],
            C: "\\mathbb{C}",
            R: "\\mathbb{R}",
            I: "\\mathbb{I}",
            norm: ["\\left\\lVert #1\\right\\rVert", 1]
          }
        },
        svg: {
          fontCache: "global"
        },
        startup: {
          typeset: false
        }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  </head>
  <body>
    <div id="slide-root"></div>
    <script type="module" src="/src/slides/main.ts"></script>
  </body>
</html>
